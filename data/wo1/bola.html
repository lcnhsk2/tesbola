<!DOCTYPE html>
<html translate="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google" content="notranslate" />
    <title>🏀 Basket Vocab Game</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y; /* tetap izinkan scroll vertikal jika perlu */
        }

        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 30px 30px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: visible !important; /* biarkan bola terbang keluar */
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 22px;
        }
        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .title h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f6e9d7;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .title .ball-icon {
            font-size: 32px;
            filter: drop-shadow(0 4px 8px rgba(255, 160, 40, 0.4));
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 16px 24px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 17px;
            font-weight: 600;
            color: #cfddee;
        }
        .stat-item .icon {
            font-size: 20px;
        }
        .stat-item .value {
            min-width: 28px;
            text-align: center;
            color: #fff;
            font-weight: 700;
        }
        .stat-item .value.score-val {
            color: #ffd780;
            font-size: 22px;
        }
        .stat-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* ===== MEANING ===== */
        .meaning-area {
            text-align: center;
            padding: 12px 10px 18px;
            position: relative;
            z-index: 5;
        }
        .meaning-label {
            font-size: 15px;
            font-weight: 400;
            color: #9ab0c9;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .meaning-text {
            font-size: 32px;
            font-weight: 600;
            color: #fff7e8;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.25);
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
        }
        .question-counter {
            font-size: 14px;
            color: #7895b0;
            margin-top: 6px;
        }

        /* ===== BASKETS ===== */
        .baskets-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 20px 0 30px;
            padding: 0 6px;
            flex-wrap: wrap;
            position: relative;
            z-index: 5;
        }

        .basket {
            flex: 1 1 150px;
            max-width: 200px;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            position: relative;
            touch-action: manipulation;
        }
        .basket:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }
        .basket:active {
            transform: scale(0.94);
        }

        .basket-body {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            background: linear-gradient(170deg, #d9a066, #b67a44 40%, #8f5e32);
            border-radius: 40% 40% 24px 24px / 60% 60% 20px 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5), inset 0 -8px 0 rgba(0, 0, 0, 0.2), inset 0 6px 12px rgba(255, 220, 140, 0.25);
            border: 2px solid rgba(255, 200, 120, 0.15);
            transition: all 0.25s;
        }
        .basket-body::before {
            content: '';
            position: absolute;
            inset: 8%;
            border-radius: 30% 30% 12px 12px / 40% 40% 10px 10px;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 6px,
                    rgba(0, 0, 0, 0.04) 6px,
                    rgba(0, 0, 0, 0.04) 7px),
                repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 6px,
                    rgba(0, 0, 0, 0.04) 6px,
                    rgba(0, 0, 0, 0.04) 7px);
            pointer-events: none;
        }
        .basket-body::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 6%;
            width: 88%;
            height: 16px;
            background: linear-gradient(180deg, #c9925a, #a8733f);
            border-radius: 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), inset 0 2px 6px rgba(255, 210, 140, 0.5);
            border: 1px solid rgba(255, 200, 140, 0.15);
        }

        .basket-hanzi {
            font-size: 34px;
            font-weight: 700;
            color: #fff7ea;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
            letter-spacing: 2px;
            line-height: 1.2;
            text-align: center;
            padding: 0 4px;
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        .basket-hanzi.small {
            font-size: 26px;
        }

        .basket-label {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #9ab0c9;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* Glow */
        .basket.correct-glow .basket-body {
            box-shadow: 0 0 40px rgba(80, 255, 120, 0.6), 0 14px 24px rgba(0, 0, 0, 0.5);
            border-color: rgba(80, 255, 120, 0.5);
        }
        .basket.wrong-glow .basket-body {
            box-shadow: 0 0 40px rgba(255, 70, 70, 0.6), 0 14px 24px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 70, 70, 0.5);
        }

        /* ===== BALL ===== */
        .ball-wrapper {
            display: flex;
            justify-content: center;
            padding: 6px 0 10px;
            position: relative;
            height: 120px; /* sedikit lebih tinggi agar bola tidak terpotong saat start */
            touch-action: none;
            overflow: visible !important; /* penting agar bola bisa terbang tinggi */
            z-index: 20; /* di atas keranjang dan teks */
        }
        .ball {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffa94d, #e07020 55%, #a04010);
            box-shadow: 0 10px 30px rgba(255, 120, 20, 0.4), inset 0 -8px 20px rgba(0, 0, 0, 0.4), inset 0 6px 20px rgba(255, 220, 140, 0.5);
            position: relative; /* default, diubah ke absolute saat terbang */
            z-index: 30;
            border: 2px solid rgba(255, 200, 120, 0.2);
            transition: none;
            will-change: transform, left, top;
            display: block;
            touch-action: none;
        }
        .ball::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 28%;
            height: 18%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .ball.flying {
            pointer-events: none;
            cursor: default;
            touch-action: none;
        }

        .ball.entered {
            animation: ballEnter 0.5s ease forwards;
        }
        @keyframes ballEnter {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(0.2); opacity: 0; }
        }

        .ball.bounced {
            animation: ballBounce 0.6s ease forwards;
        }
        @keyframes ballBounce {
            0% { transform: scale(1); }
            30% { transform: translateY(-20px) scale(1.1); }
            60% { transform: translateY(10px) scale(0.9); }
            100% { transform: translateY(0) scale(1); }
        }

        /* ===== FEEDBACK ===== */
        .feedback-area {
            text-align: center;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 600;
            padding: 4px 0;
            transition: all 0.25s;
            position: relative;
            z-index: 10;
        }
        .feedback-area .fb-icon {
            font-size: 32px;
        }
        .feedback-area .fb-text {
            color: #e8eef5;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .feedback-area .fb-text.correct {
            color: #7dffb3;
        }
        .feedback-area .fb-text.wrong {
            color: #ff7a7a;
        }
        .feedback-area .fb-score {
            font-size: 18px;
            color: #ffd780;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 16px;
            border-radius: 30px;
        }

        /* ===== NEXT BUTTON ===== */
        .next-btn {
            display: none;
            margin: 14px auto 0;
            padding: 12px 42px;
            font-size: 20px;
            font-weight: 700;
            color: #1a2a3a;
            background: linear-gradient(145deg, #ffd780, #f5b84a);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 180, 60, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 10;
            touch-action: manipulation;
        }
        .next-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(255, 180, 60, 0.45);
        }
        .next-btn:active {
            transform: scale(0.96);
        }
        .next-btn.show {
            display: block;
        }

        /* ===== GAME OVER ===== */
        .game-over {
            display: none;
            text-align: center;
            padding: 30px 10px 10px;
            position: relative;
            z-index: 10;
        }
        .game-over.show {
            display: block;
        }
        .game-over .big-icon {
            font-size: 72px;
            margin-bottom: 10px;
        }
        .game-over h2 {
            font-size: 34px;
            color: #fff7e8;
            margin-bottom: 8px;
        }
        .game-over .final-score {
            font-size: 26px;
            color: #ffd780;
            font-weight: 700;
        }
        .game-over .final-detail {
            font-size: 18px;
            color: #9ab0c9;
            margin-top: 6px;
        }
        .restart-btn {
            margin-top: 22px;
            padding: 14px 48px;
            font-size: 20px;
            font-weight: 700;
            color: #1a2a3a;
            background: linear-gradient(145deg, #7dffb3, #4ad08a);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(80, 255, 120, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .restart-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(80, 255, 120, 0.35);
        }
        .restart-btn:active {
            transform: scale(0.96);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .game-container {
                padding: 18px 14px 28px;
                border-radius: 32px;
            }
            .title h1 {
                font-size: 18px;
            }
            .title .ball-icon {
                font-size: 24px;
            }
            .stats {
                gap: 8px 12px;
                padding: 6px 14px 6px 12px;
            }
            .stat-item {
                font-size: 14px;
            }
            .stat-item .value.score-val {
                font-size: 18px;
            }
            .meaning-text {
                font-size: 24px;
                padding: 4px 18px;
            }
            .baskets-row {
                gap: 12px;
            }
            .basket {
                flex: 1 1 90px;
                min-width: 80px;
            }
            .basket-hanzi {
                font-size: 26px;
            }
            .basket-hanzi.small {
                font-size: 20px;
            }
            .ball {
                width: 62px;
                height: 62px;
            }
            .ball-wrapper {
                height: 100px;
            }
            .feedback-area {
                font-size: 18px;
                min-height: 44px;
            }
            .feedback-area .fb-icon {
                font-size: 26px;
            }
            .next-btn {
                padding: 10px 30px;
                font-size: 17px;
            }
            .stat-divider {
                display: none;
            }
        }
        @media (max-width: 420px) {
            .basket-hanzi {
                font-size: 20px;
            }
            .basket-hanzi.small {
                font-size: 16px;
            }
            .basket-body {
                border-radius: 30% 30% 16px 16px / 50% 50% 14px 14px;
            }
            .basket-body::after {
                height: 10px;
                top: -4px;
            }
            .meaning-text {
                font-size: 20px;
            }
            .ball {
                width: 52px;
                height: 52px;
            }
            .ball-wrapper {
                height: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="title">
                <span class="ball-icon">🏀</span>
                <h1>Basket Vocab</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="icon">⭐</span>
                    <span class="value score-val" id="scoreDisplay">0</span>
                </div>
                <span class="stat-divider"></span>
                <div class="stat-item">
                    <span class="icon">✅</span>
                    <span class="value" id="correctCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="icon">❌</span>
                    <span class="value" id="wrongCount">0</span>
                </div>
                <span class="stat-divider"></span>
                <div class="stat-item">
                    <span class="icon">📌</span>
                    <span class="value" id="questionCounter">1/30</span>
                </div>
            </div>
        </div>

        <!-- MEANING -->
        <div class="meaning-area">
            <div class="meaning-label">🇮🇩 Arti</div>
            <div class="meaning-text" id="meaningDisplay">—</div>
            <div class="question-counter" id="progressHint">Klik keranjang untuk melempar</div>
        </div>

        <!-- BASKETS -->
        <div class="baskets-row" id="basketsRow">
            <div class="basket" data-index="0" id="basket0">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi0">—</span>
                </div>
                <span class="basket-label">A</span>
            </div>
            <div class="basket" data-index="1" id="basket1">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi1">—</span>
                </div>
                <span class="basket-label">B</span>
            </div>
            <div class="basket" data-index="2" id="basket2">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi2">—</span>
                </div>
                <span class="basket-label">C</span>
            </div>
        </div>

        <!-- BALL -->
        <div class="ball-wrapper" id="ballWrapper">
            <div class="ball" id="ball"></div>
        </div>

        <!-- FEEDBACK -->
        <div class="feedback-area" id="feedbackArea">
            <span class="fb-icon" id="fbIcon">💡</span>
            <span class="fb-text" id="fbText">Klik keranjang pilihanmu!</span>
        </div>

        <!-- NEXT BUTTON -->
        <button class="next-btn" id="nextBtn">▶ Lanjut</button>

        <!-- GAME OVER -->
        <div class="game-over" id="gameOver">
            <div class="big-icon">🏆</div>
            <h2>Permainan Selesai!</h2>
            <div class="final-score" id="finalScore">Skor: 0</div>
            <div class="final-detail" id="finalDetail">✅ 0 benar · ❌ 0 salah</div>
            <button class="restart-btn" id="restartBtn">🔄 Main Lagi</button>
        </div>
    </div>

    <script>

        // ============================================================
        //  SOUND ENGINE (Web Audio)
        // ============================================================
        class SoundEngine {
            constructor() { this.ctx = null; this.ready = false; }
            init() {
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.ready = true;
                } catch (_) { this.ready = false; }
            }
            playApplause() {
                if (!this.ready) return;
                try {
                    const ctx = this.ctx,
                        now = ctx.currentTime;
                    for (let i = 0; i < 18; i++) {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        const freq = 800 + Math.random() * 600;
                        osc.frequency.value = freq;
                        const dur = 0.04 + Math.random() * 0.06;
                        const t = now + 0.06 * i + Math.random() * 0.03;
                        gain.gain.setValueAtTime(0.08 + Math.random() * 0.06, t);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                        osc.start(t);
                        osc.stop(t + dur + 0.01);
                        if (i % 2 === 0) {
                            const osc2 = ctx.createOscillator();
                            const gain2 = ctx.createGain();
                            osc2.connect(gain2);
                            gain2.connect(ctx.destination);
                            osc2.frequency.value = freq * 1.5;
                            gain2.gain.setValueAtTime(0.04 + Math.random() * 0.04, t + 0.01);
                            gain2.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.01);
                            osc2.start(t + 0.01);
                            osc2.stop(t + dur + 0.02);
                        }
                    }
                    setTimeout(() => {
                        try {
                            for (let i = 0; i < 6; i++) {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain);
                                gain.connect(ctx.destination);
                                osc.frequency.value = 1200 + Math.random() * 400;
                                const t = ctx.currentTime + i * 0.08;
                                gain.gain.setValueAtTime(0.05, t);
                                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                                osc.start(t);
                                osc.stop(t + 0.09);
                            }
                        } catch (_) {}
                    }, 200);
                } catch (_) {}
            }
            playMocking() {
                if (!this.ready) return;
                try {
                    const ctx = this.ctx,
                        now = ctx.currentTime;
                    const notes = [600, 500, 420, 350, 300, 250];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq;
                        const t = now + i * 0.12;
                        gain.gain.setValueAtTime(0.08, t);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                        osc.start(t);
                        osc.stop(t + 0.16);
                        osc.frequency.setValueAtTime(freq, t);
                        osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + 0.12);
                    });
                    const oscB = ctx.createOscillator();
                    const gainB = ctx.createGain();
                    oscB.connect(gainB);
                    gainB.connect(ctx.destination);
                    oscB.type = 'square';
                    oscB.frequency.value = 180;
                    gainB.gain.setValueAtTime(0.04, now + 0.05);
                    gainB.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    oscB.start(now + 0.05);
                    oscB.stop(now + 0.46);
                    const oscB2 = ctx.createOscillator();
                    const gainB2 = ctx.createGain();
                    oscB2.connect(gainB2);
                    gainB2.connect(ctx.destination);
                    oscB2.type = 'sawtooth';
                    oscB2.frequency.value = 140;
                    gainB2.gain.setValueAtTime(0.03, now + 0.1);
                    gainB2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    oscB2.start(now + 0.1);
                    oscB2.stop(now + 0.51);
                } catch (_) {}
            }
        }

        // ============================================================
        //  GAME STATE
        // ============================================================
        const NUM_QUESTIONS = 30;
        let state = {
            questions: [],
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            wrongCount: 0,
            totalQuestions: NUM_QUESTIONS,
            isAnimating: false,
            answered: false,
            gameOver: false,
        };

        const $ = id => document.getElementById(id);
        const ball = $('ball');
        const ballWrapper = $('ballWrapper');
        const baskets = [$('basket0'), $('basket1'), $('basket2')];
        const hanziEls = [$('hanzi0'), $('hanzi1'), $('hanzi2')];
        const meaningDisplay = $('meaningDisplay');
        const scoreDisplay = $('scoreDisplay');
        const correctCountEl = $('correctCount');
        const wrongCountEl = $('wrongCount');
        const questionCounter = $('questionCounter');
        const progressHint = $('progressHint');
        const feedbackArea = $('feedbackArea');
        const fbIcon = $('fbIcon');
        const fbText = $('fbText');
        const nextBtn = $('nextBtn');
        const gameOverEl = $('gameOver');
        const finalScore = $('finalScore');
        const finalDetail = $('finalDetail');
        const restartBtn = $('restartBtn');

        const sound = new SoundEngine();

        // ============================================================
        //  HELPERS
        // ============================================================
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function pickRandom(arr, n) {
            const copy = [...arr];
            shuffle(copy);
            return copy.slice(0, n);
        }

        function buildQuestions() {
            const selected = pickRandom(MASTER_VOCAB, NUM_QUESTIONS);
            return selected.map(item => {
                let distractors = [];
                const pool = MASTER_VOCAB.filter(v => v.hanzi !== item.hanzi);
                const shuffledPool = shuffle(pool);
                for (let i = 0; i < shuffledPool.length && distractors.length < 2; i++) {
                    if (!distractors.some(d => d.hanzi === shuffledPool[i].hanzi)) {
                        distractors.push(shuffledPool[i]);
                    }
                }
                while (distractors.length < 2) {
                    distractors.push({ hanzi: '???', meaning: 'dummy' });
                }
                const options = shuffle([
                    { hanzi: item.hanzi, correct: true },
                    { hanzi: distractors[0].hanzi, correct: false },
                    { hanzi: distractors[1].hanzi, correct: false }
                ]);
                return {
                    meaning: item.meaning,
                    correct: item.hanzi,
                    options: options.map(o => o.hanzi)
                };
            });
        }

        // ============================================================
        //  RENDER QUESTION (reset bola sepenuhnya)
        // ============================================================
        function renderQuestion() {
            if (state.gameOver) return;
            const q = state.questions[state.currentIndex];
            if (!q) return;

            meaningDisplay.textContent = q.meaning;
            for (let i = 0; i < 3; i++) {
                hanziEls[i].textContent = q.options[i];
                hanziEls[i].classList.toggle('small', q.options[i].length > 2);
                baskets[i].className = 'basket';
                baskets[i].dataset.correct = q.options[i] === q.correct ? 'true' : 'false';
            }

            // === RESET BOLA SEPENUHNYA ===
            ball.className = 'ball';
            ball.style.position = 'relative';
            ball.style.left = '';
            ball.style.top = '';
            ball.style.transform = '';
            ball.style.opacity = '1';
            ball.style.display = 'block';
            ball.style.pointerEvents = 'auto';
            ball.style.width = '';
            ball.style.height = '';
            ball.style.margin = '';
            if (ball.parentNode !== ballWrapper) {
                ballWrapper.appendChild(ball);
            }
            ball.classList.remove('entered', 'bounced', 'flying');

            fbIcon.textContent = '💡';
            fbText.textContent = 'Klik keranjang untuk melempar!';
            fbText.className = 'fb-text';
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());

            nextBtn.classList.remove('show');
            nextBtn.style.display = 'none';

            state.answered = false;
            state.isAnimating = false;

            questionCounter.textContent = `${state.currentIndex + 1}/${state.totalQuestions}`;
            progressHint.textContent = 'Pilih keranjang yang benar';
        }

        function updateStats() {
            scoreDisplay.textContent = state.score;
            correctCountEl.textContent = state.correctCount;
            wrongCountEl.textContent = state.wrongCount;
        }

        // ============================================================
        //  THROW BALL (parabola tinggi)
        // ============================================================
        function throwBall(basketEl, isCorrect) {
            if (state.isAnimating || state.answered || state.gameOver) return;

            state.answered = true;
            state.isAnimating = true;

            const ballRect = ball.getBoundingClientRect();
            const basketRect = basketEl.querySelector('.basket-body').getBoundingClientRect();
            const wrapperRect = ballWrapper.getBoundingClientRect();

            const startX = ballRect.left - wrapperRect.left + ballRect.width / 2;
            const startY = ballRect.top - wrapperRect.top + ballRect.height / 2;
            const endX = basketRect.left - wrapperRect.left + basketRect.width / 2;
            const endY = basketRect.top - wrapperRect.top + basketRect.height / 2;

            // Ubah bola menjadi absolute
            ball.style.position = 'absolute';
            ball.style.left = (startX - 38) + 'px';
            ball.style.top = (startY - 38) + 'px';
            ball.style.width = '76px';
            ball.style.height = '76px';
            ball.style.margin = '0';
            ball.style.transform = 'scale(1)';
            ball.style.transition = 'none';
            void ball.offsetHeight;

            const duration = 550; // sedikit lebih lambat agar terlihat dramatis
            const startTime = performance.now();
            const startLeft = parseFloat(ball.style.left);
            const startTop = parseFloat(ball.style.top);
            const deltaX = endX - 38 - startLeft;
            const deltaY = endY - 38 - startTop;
            // TINGGI LAMBUNGAN: -280px agar melambung sangat tinggi dan masuk dari atas
            const peak = -280;

            ball.classList.add('flying');

            function animateThrow(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // easeOutCubic untuk pendaratan yang halus
                const ease = 1 - Math.pow(1 - progress, 3);
                const x = startLeft + deltaX * ease;
                const y = startTop + deltaY * ease + peak * 4 * progress * (1 - progress);
                ball.style.left = x + 'px';
                ball.style.top = y + 'px';

                if (progress < 1) {
                    requestAnimationFrame(animateThrow);
                } else {
                    ball.style.left = (endX - 38) + 'px';
                    ball.style.top = (endY - 38) + 'px';
                    afterThrow(basketEl, isCorrect);
                }
            }
            requestAnimationFrame(animateThrow);
        }

        function afterThrow(basketEl, isCorrect) {
            const correctBasket = baskets.find(b => b.dataset.correct === 'true');

            if (isCorrect) {
                ball.classList.remove('flying');
                ball.classList.add('entered');
                setTimeout(() => {
                    ball.style.display = 'none';
                }, 500);

                state.score += 2;
                state.correctCount++;
                basketEl.classList.add('correct-glow');

                fbIcon.textContent = '🎉';
                fbText.textContent = 'Benar! +2 poin';
                fbText.className = 'fb-text correct';
                sound.playApplause();
                const bump = document.createElement('span');
                bump.className = 'fb-score';
                bump.textContent = '+2';
                feedbackArea.appendChild(bump);

            } else {
                ball.classList.remove('flying');
                ball.classList.add('bounced');
                setTimeout(() => {
                    ball.classList.remove('bounced');
                    ball.style.position = 'relative';
                    ball.style.left = '';
                    ball.style.top = '';
                    ball.style.transform = '';
                    ball.style.opacity = '1';
                    ball.style.display = 'block';
                    ballWrapper.appendChild(ball);
                }, 600);

                state.score -= 3;
                state.wrongCount++;
                basketEl.classList.add('wrong-glow');
                if (correctBasket) {
                    correctBasket.classList.add('correct-glow');
                }

                fbIcon.textContent = '😅';
                fbText.textContent = `Salah! -3 poin · Jawaban: ${correctBasket?.querySelector('.basket-hanzi')?.textContent || '?'}`;
                fbText.className = 'fb-text wrong';
                sound.playMocking();
                const bump = document.createElement('span');
                bump.className = 'fb-score';
                bump.textContent = '-3';
                bump.style.color = '#ff7a7a';
                feedbackArea.appendChild(bump);
            }

            updateStats();

            setTimeout(() => {
                state.isAnimating = false;
                if (!state.gameOver) {
                    nextBtn.style.display = 'block';
                    nextBtn.classList.add('show');
                    if (state.currentIndex >= state.totalQuestions - 1) {
                        nextBtn.textContent = '🏁 Lihat Hasil';
                    } else {
                        nextBtn.textContent = '▶ Lanjut';
                    }
                }
            }, 800);
        }

        // ============================================================
        //  HANDLE BASKET CLICK
        // ============================================================
        function onBasketClick(e) {
            const basketEl = e.currentTarget;
            if (state.isAnimating || state.answered || state.gameOver) return;
            const isCorrect = basketEl.dataset.correct === 'true';
            throwBall(basketEl, isCorrect);
        }

        // ============================================================
        //  NEXT / GAME OVER
        // ============================================================
        function goToNext() {
            if (state.isAnimating) return;
            if (state.gameOver) return;
            if (state.currentIndex >= state.totalQuestions - 1) {
                endGame();
                return;
            }
            state.currentIndex++;
            renderQuestion();
            baskets.forEach(b => b.className = 'basket');
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
        }

        function endGame() {
            state.gameOver = true;
            gameOverEl.classList.add('show');
            finalScore.textContent = `Skor Akhir: ${state.score}`;
            finalDetail.textContent = `✅ ${state.correctCount} benar · ❌ ${state.wrongCount} salah`;
            document.querySelector('.meaning-area').style.opacity = '0.4';
            document.querySelector('.baskets-row').style.opacity = '0.4';
            ball.style.display = 'none';
            nextBtn.style.display = 'none';
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
            fbIcon.textContent = '🏁';
            fbText.textContent = 'Permainan selesai!';
            fbText.className = 'fb-text';
        }

        function restartGame() {
            state.questions = buildQuestions();
            state.currentIndex = 0;
            state.score = 0;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.totalQuestions = state.questions.length;
            state.isAnimating = false;
            state.answered = false;
            state.gameOver = false;

            gameOverEl.classList.remove('show');
            document.querySelector('.meaning-area').style.opacity = '1';
            document.querySelector('.baskets-row').style.opacity = '1';
            ball.style.display = 'block';
            ball.className = 'ball';
            ball.style.position = 'relative';
            ball.style.left = '';
            ball.style.top = '';
            ball.style.transform = '';
            ball.style.opacity = '1';
            ball.style.pointerEvents = 'auto';
            ballWrapper.appendChild(ball);
            nextBtn.style.display = 'none';
            nextBtn.classList.remove('show');
            nextBtn.textContent = '▶ Lanjut';
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
            baskets.forEach(b => b.className = 'basket');

            updateStats();
            renderQuestion();
            if (!sound.ready) sound.init();
        }

        // ============================================================
        //  INIT
        // ============================================================
        function init() {
            // Matikan klik kanan di seluruh halaman
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // Inisialisasi sound
            document.addEventListener('click', () => { if (!sound.ready) sound.init(); }, { once: true });
            document.addEventListener('touchstart', () => { if (!sound.ready) sound.init(); }, { once: true });

            state.questions = buildQuestions();
            state.totalQuestions = state.questions.length;
            state.currentIndex = 0;
            state.score = 0;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.gameOver = false;

            updateStats();
            renderQuestion();

            baskets.forEach(b => {
                b.addEventListener('click', onBasketClick);
                // Untuk sentuhan di iOS
                b.addEventListener('touchstart', (e) => {
                    // Hanya prevent default jika tidak sedang animasi, biar tidak menggulir
                    if (state.isAnimating || state.answered || state.gameOver) return;
                    // Biarkan click yang menangani, tapi kita bisa memicu secara langsung
                }, { passive: true });
            });

            nextBtn.addEventListener('click', goToNext);
            restartBtn.addEventListener('click', restartGame);

            document.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.key === 'Enter') && nextBtn.classList.contains('show')) {
                    e.preventDefault();
                    goToNext();
                }
                if (e.key === 'r' && state.gameOver) {
                    restartGame();
                }
            });

            console.log(`🏀 Basket Vocab siap! ${state.totalQuestions} soal dari ${MASTER_VOCAB.length} kosakata.`);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
