<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏀 入球游戏 - Kosakata Mandarin</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* ===== GAME CONTAINER ===== */
        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 30px 30px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 22px;
        }
        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .title h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f6e9d7;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .title .ball-icon {
            font-size: 32px;
            filter: drop-shadow(0 4px 8px rgba(255, 160, 40, 0.4));
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 16px 24px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 17px;
            font-weight: 600;
            color: #cfddee;
        }
        .stat-item .icon {
            font-size: 20px;
        }
        .stat-item .value {
            min-width: 28px;
            text-align: center;
            color: #fff;
            font-weight: 700;
        }
        .stat-item .value.score-val {
            color: #ffd780;
            font-size: 22px;
        }
        .stat-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* ===== MEANING DISPLAY ===== */
        .meaning-area {
            text-align: center;
            padding: 12px 10px 18px;
        }
        .meaning-label {
            font-size: 15px;
            font-weight: 400;
            color: #9ab0c9;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .meaning-text {
            font-size: 32px;
            font-weight: 600;
            color: #fff7e8;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.25);
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
        }
        .question-counter {
            font-size: 14px;
            color: #7895b0;
            margin-top: 6px;
        }

        /* ===== BASKETS ROW ===== */
        .baskets-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 20px 0 30px;
            padding: 0 6px;
            flex-wrap: wrap;
        }

        /* ===== SINGLE BASKET ===== */
        .basket {
            flex: 1 1 150px;
            max-width: 200px;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            position: relative;
        }
        .basket:hover {
            transform: translateY(-3px);
        }
        .basket:active {
            transform: scale(0.96);
        }
        .basket.drag-over {
            transform: scale(1.04);
            filter: brightness(1.2);
        }

        /* Basket body */
        .basket-body {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            background: linear-gradient(170deg, #d9a066, #b67a44 40%, #8f5e32);
            border-radius: 40% 40% 24px 24px / 60% 60% 20px 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5), inset 0 -8px 0 rgba(0, 0, 0, 0.2), inset 0 6px 12px rgba(255, 220, 140, 0.25);
            border: 2px solid rgba(255, 200, 120, 0.15);
            transition: all 0.25s;
        }
        /* Basket weave texture (subtle) */
        .basket-body::before {
            content: '';
            position: absolute;
            inset: 8%;
            border-radius: 30% 30% 12px 12px / 40% 40% 10px 10px;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 6px,
                    rgba(0, 0, 0, 0.04) 6px,
                    rgba(0, 0, 0, 0.04) 7px),
                repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 6px,
                    rgba(0, 0, 0, 0.04) 6px,
                    rgba(0, 0, 0, 0.04) 7px);
            pointer-events: none;
        }
        /* Basket rim */
        .basket-body::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 6%;
            width: 88%;
            height: 16px;
            background: linear-gradient(180deg, #c9925a, #a8733f);
            border-radius: 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), inset 0 2px 6px rgba(255, 210, 140, 0.5);
            border: 1px solid rgba(255, 200, 140, 0.15);
        }

        /* Hanzi on basket */
        .basket-hanzi {
            font-size: 34px;
            font-weight: 700;
            color: #fff7ea;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
            letter-spacing: 2px;
            line-height: 1.2;
            text-align: center;
            padding: 0 4px;
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        .basket-hanzi.small {
            font-size: 26px;
        }

        /* Basket label (A/B/C) */
        .basket-label {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #9ab0c9;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* Basket glow on correct/incorrect */
        .basket.correct-glow .basket-body {
            box-shadow: 0 0 40px rgba(80, 255, 120, 0.6), 0 14px 24px rgba(0, 0, 0, 0.5);
            border-color: rgba(80, 255, 120, 0.5);
        }
        .basket.wrong-glow .basket-body {
            box-shadow: 0 0 40px rgba(255, 70, 70, 0.6), 0 14px 24px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 70, 70, 0.5);
        }

        /* ===== BALL ===== */
        .ball-wrapper {
            display: flex;
            justify-content: center;
            padding: 6px 0 10px;
            position: relative;
            height: 110px;
            touch-action: none;
        }
        .ball {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffa94d, #e07020 55%, #a04010);
            box-shadow: 0 10px 30px rgba(255, 120, 20, 0.4), inset 0 -8px 20px rgba(0, 0, 0, 0.4), inset 0 6px 20px rgba(255, 220, 140, 0.5);
            cursor: grab;
            transition: transform 0.15s, box-shadow 0.2s;
            position: relative;
            touch-action: none;
            z-index: 10;
            border: 2px solid rgba(255, 200, 120, 0.2);
        }
        .ball::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 28%;
            height: 18%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }
        .ball:active {
            cursor: grabbing;
        }
        .ball.dragging {
            cursor: grabbing;
            transform: scale(1.12);
            box-shadow: 0 16px 48px rgba(255, 120, 20, 0.6);
            z-index: 50;
            transition: none;
        }
        .ball.dropped-correct {
            animation: ballDropCorrect 0.55s ease forwards;
        }
        .ball.dropped-wrong {
            animation: ballDropWrong 0.6s ease forwards;
        }
        .ball.hidden-ball {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        /* ===== BALL ANIMATIONS ===== */
        @keyframes ballDropCorrect {
            0% {
                transform: scale(1.1);
                opacity: 1;
            }
            40% {
                transform: scale(0.8) translateY(40px);
                opacity: 0.9;
            }
            100% {
                transform: scale(0.3) translateY(90px);
                opacity: 0;
            }
        }
        @keyframes ballDropWrong {
            0% {
                transform: translateX(0);
                opacity: 1;
            }
            20% {
                transform: translateX(-30px) rotate(-15deg);
            }
            40% {
                transform: translateX(30px) rotate(15deg);
            }
            60% {
                transform: translateX(-18px) rotate(-8deg);
            }
            80% {
                transform: translateX(12px) rotate(5deg);
            }
            100% {
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== DRAG GHOST (clone) ===== */
        .ball-ghost {
            position: fixed;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffa94d, #e07020 55%, #a04010);
            box-shadow: 0 20px 50px rgba(255, 120, 20, 0.7);
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%) scale(1.08);
            border: 2px solid rgba(255, 200, 120, 0.3);
            display: none;
        }
        .ball-ghost::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 28%;
            height: 18%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        /* ===== FEEDBACK ===== */
        .feedback-area {
            text-align: center;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 600;
            padding: 4px 0;
            transition: all 0.25s;
        }
        .feedback-area .fb-icon {
            font-size: 32px;
        }
        .feedback-area .fb-text {
            color: #e8eef5;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .feedback-area .fb-text.correct {
            color: #7dffb3;
        }
        .feedback-area .fb-text.wrong {
            color: #ff7a7a;
        }
        .feedback-area .fb-score {
            font-size: 18px;
            color: #ffd780;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 16px;
            border-radius: 30px;
        }

        /* ===== NEXT BUTTON ===== */
        .next-btn {
            display: none;
            margin: 14px auto 0;
            padding: 12px 42px;
            font-size: 20px;
            font-weight: 700;
            color: #1a2a3a;
            background: linear-gradient(145deg, #ffd780, #f5b84a);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 180, 60, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }
        .next-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(255, 180, 60, 0.45);
        }
        .next-btn:active {
            transform: scale(0.96);
        }
        .next-btn.show {
            display: block;
        }

        /* ===== GAME OVER ===== */
        .game-over {
            display: none;
            text-align: center;
            padding: 30px 10px 10px;
        }
        .game-over.show {
            display: block;
        }
        .game-over .big-icon {
            font-size: 72px;
            margin-bottom: 10px;
        }
        .game-over h2 {
            font-size: 34px;
            color: #fff7e8;
            margin-bottom: 8px;
        }
        .game-over .final-score {
            font-size: 26px;
            color: #ffd780;
            font-weight: 700;
        }
        .game-over .final-detail {
            font-size: 18px;
            color: #9ab0c9;
            margin-top: 6px;
        }
        .restart-btn {
            margin-top: 22px;
            padding: 14px 48px;
            font-size: 20px;
            font-weight: 700;
            color: #1a2a3a;
            background: linear-gradient(145deg, #7dffb3, #4ad08a);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(80, 255, 120, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .restart-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(80, 255, 120, 0.35);
        }
        .restart-btn:active {
            transform: scale(0.96);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .game-container {
                padding: 18px 14px 28px;
                border-radius: 32px;
            }
            .title h1 {
                font-size: 18px;
            }
            .title .ball-icon {
                font-size: 24px;
            }
            .stats {
                gap: 8px 12px;
                padding: 6px 14px 6px 12px;
            }
            .stat-item {
                font-size: 14px;
            }
            .stat-item .value.score-val {
                font-size: 18px;
            }
            .meaning-text {
                font-size: 24px;
                padding: 4px 18px;
            }
            .baskets-row {
                gap: 12px;
            }
            .basket {
                flex: 1 1 90px;
                min-width: 80px;
            }
            .basket-hanzi {
                font-size: 26px;
            }
            .basket-hanzi.small {
                font-size: 20px;
            }
            .ball {
                width: 62px;
                height: 62px;
            }
            .ball-wrapper {
                height: 90px;
            }
            .feedback-area {
                font-size: 18px;
                min-height: 44px;
            }
            .feedback-area .fb-icon {
                font-size: 26px;
            }
            .next-btn {
                padding: 10px 30px;
                font-size: 17px;
            }
            .stat-divider {
                display: none;
            }
            .ball-ghost {
                width: 62px;
                height: 62px;
            }
        }
        @media (max-width: 420px) {
            .basket-hanzi {
                font-size: 20px;
            }
            .basket-hanzi.small {
                font-size: 16px;
            }
            .basket-body {
                border-radius: 30% 30% 16px 16px / 50% 50% 14px 14px;
            }
            .basket-body::after {
                height: 10px;
                top: -4px;
            }
            .meaning-text {
                font-size: 20px;
            }
            .ball {
                width: 52px;
                height: 52px;
            }
            .ball-wrapper {
                height: 76px;
            }
            .ball-ghost {
                width: 52px;
                height: 52px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="title">
                <span class="ball-icon">🏀</span>
                <h1>入球游戏-by lcnpalembang</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="icon">⭐</span>
                    <span class="value score-val" id="scoreDisplay">0</span>
                </div>
                <span class="stat-divider"></span>
                <div class="stat-item">
                    <span class="icon">✅</span>
                    <span class="value" id="correctCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="icon">❌</span>
                    <span class="value" id="wrongCount">0</span>
                </div>
                <span class="stat-divider"></span>
                <div class="stat-item">
                    <span class="icon">📌</span>
                    <span class="value" id="questionCounter">1/20</span>
                </div>
            </div>
        </div>

        <!-- MEANING -->
        <div class="meaning-area">
            <div class="meaning-label">🇮🇩 Arti</div>
            <div class="meaning-text" id="meaningDisplay">—</div>
            <div class="question-counter" id="progressHint">Pilih keranjang yang benar</div>
        </div>

        <!-- BASKETS -->
        <div class="baskets-row" id="basketsRow">
            <!-- Basket A -->
            <div class="basket" data-index="0" id="basket0">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi0">—</span>
                </div>
                <span class="basket-label">A</span>
            </div>
            <!-- Basket B -->
            <div class="basket" data-index="1" id="basket1">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi1">—</span>
                </div>
                <span class="basket-label">B</span>
            </div>
            <!-- Basket C -->
            <div class="basket" data-index="2" id="basket2">
                <div class="basket-body">
                    <span class="basket-hanzi" id="hanzi2">—</span>
                </div>
                <span class="basket-label">C</span>
            </div>
        </div>

        <!-- BALL -->
        <div class="ball-wrapper" id="ballWrapper">
            <div class="ball" id="ball"></div>
        </div>

        <!-- FEEDBACK -->
        <div class="feedback-area" id="feedbackArea">
            <span class="fb-icon" id="fbIcon">💡</span>
            <span class="fb-text" id="fbText">Seret bola ke keranjang!</span>
        </div>

        <!-- NEXT BUTTON -->
        <button class="next-btn" id="nextBtn">▶ Lanjut</button>

        <!-- GAME OVER -->
        <div class="game-over" id="gameOver">
            <div class="big-icon">🏆</div>
            <h2>Permainan Selesai!</h2>
            <div class="final-score" id="finalScore">Skor: 0</div>
            <div class="final-detail" id="finalDetail">✅ 0 benar · ❌ 0 salah</div>
            <button class="restart-btn" id="restartBtn">🔄 Main Lagi</button>
        </div>
    </div>

    <!-- Drag Ghost -->
    <div class="ball-ghost" id="ballGhost"></div>

    <script>
        // ============================================================
        //  SOUND ENGINE (Web Audio API)
        // ============================================================
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.ready = false;
            }

            init() {
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.ready = true;
                } catch (_) {
                    this.ready = false;
                }
            }

            // ———— APPLAUSE ————
            playApplause() {
                if (!this.ready) return;
                try {
                    const ctx = this.ctx;
                    const now = ctx.currentTime;
                    const count = 18;
                    for (let i = 0; i < count; i++) {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        const freq = 800 + Math.random() * 600;
                        osc.frequency.value = freq;
                        const dur = 0.04 + Math.random() * 0.06;
                        const t = now + 0.06 * i + Math.random() * 0.03;
                        gain.gain.setValueAtTime(0.08 + Math.random() * 0.06, t);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                        osc.start(t);
                        osc.stop(t + dur + 0.01);
                        // Add a second layer for richness
                        if (i % 2 === 0) {
                            const osc2 = ctx.createOscillator();
                            const gain2 = ctx.createGain();
                            osc2.connect(gain2);
                            gain2.connect(ctx.destination);
                            osc2.frequency.value = freq * 1.5;
                            gain2.gain.setValueAtTime(0.04 + Math.random() * 0.04, t + 0.01);
                            gain2.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.01);
                            osc2.start(t + 0.01);
                            osc2.stop(t + dur + 0.02);
                        }
                    }
                    // Cheer layer
                    setTimeout(() => {
                        try {
                            for (let i = 0; i < 6; i++) {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain);
                                gain.connect(ctx.destination);
                                osc.frequency.value = 1200 + Math.random() * 400;
                                const t = ctx.currentTime + i * 0.08;
                                gain.gain.setValueAtTime(0.05, t);
                                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                                osc.start(t);
                                osc.stop(t + 0.09);
                            }
                        } catch (_) {}
                    }, 200);
                } catch (_) {}
            }

            // ———— MOCKING / WRONG ————
            playMocking() {
                if (!this.ready) return;
                try {
                    const ctx = this.ctx;
                    const now = ctx.currentTime;
                    // Descending "wah wah" using oscillator with vibrato
                    const notes = [600, 500, 420, 350, 300, 250];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq;
                        const t = now + i * 0.12;
                        gain.gain.setValueAtTime(0.08, t);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                        osc.start(t);
                        osc.stop(t + 0.16);
                        // Add a bit of pitch bend
                        osc.frequency.setValueAtTime(freq, t);
                        osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + 0.12);
                    });
                    // Add a "buzzer" effect
                    const oscB = ctx.createOscillator();
                    const gainB = ctx.createGain();
                    oscB.connect(gainB);
                    gainB.connect(ctx.destination);
                    oscB.type = 'square';
                    oscB.frequency.value = 180;
                    gainB.gain.setValueAtTime(0.04, now + 0.05);
                    gainB.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    oscB.start(now + 0.05);
                    oscB.stop(now + 0.46);
                    // Second layer
                    const oscB2 = ctx.createOscillator();
                    const gainB2 = ctx.createGain();
                    oscB2.connect(gainB2);
                    gainB2.connect(ctx.destination);
                    oscB2.type = 'sawtooth';
                    oscB2.frequency.value = 140;
                    gainB2.gain.setValueAtTime(0.03, now + 0.1);
                    gainB2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    oscB2.start(now + 0.1);
                    oscB2.stop(now + 0.51);
                } catch (_) {}
            }
        }

        // ============================================================
        //  QUESTION BANK (20 questions)
        // ============================================================
        const QUESTIONS = [{
            meaning: 'masuk (mendekati pembicara)',
            correct: '进来',
            distractors: ['进去', '出来']
        }, {
            meaning: 'naik (menjauhi pembicara)',
            correct: '上去',
            distractors: ['上来', '下去']
        }, {
            meaning: 'membeli',
            correct: '买',
            distractors: ['卖', '找']
        }, {
            meaning: 'membuka / mengemudi',
            correct: '开',
            distractors: ['关', '找']
        }, {
            meaning: 'banyak',
            correct: '多',
            distractors: ['少', '好']
        }, {
            meaning: 'cepat',
            correct: '快',
            distractors: ['慢', '冷']
        }, {
            meaning: 'minum',
            correct: '喝',
            distractors: ['吃', '洗']
        }, {
            meaning: 'kembali (mendekati pembicara)',
            correct: '回来',
            distractors: ['回去', '过来']
        }, {
            meaning: 'turun (mendekati pembicara)',
            correct: '下来',
            distractors: ['下去', '上来']
        }, {
            meaning: 'keluar (menjauhi pembicara)',
            correct: '出去',
            distractors: ['出来', '进去']
        }, {
            meaning: 'sopan / terlalu baik',
            correct: '客气',
            distractors: ['不好意思', '漂亮']
        }, {
            meaning: 'mencari',
            correct: '找',
            distractors: ['我', '接']
        }, {
            meaning: 'sedikit',
            correct: '少',
            distractors: ['多', '快']
        }, {
            meaning: 'panas',
            correct: '热',
            distractors: ['冷', '多']
        }, {
            meaning: 'makan',
            correct: '吃饭',
            distractors: ['做菜', '睡觉']
        }, {
            meaning: 'menunggu',
            correct: '等',
            distractors: ['接', '送']
        }, {
            meaning: 'kepada / untuk',
            correct: '给',
            distractors: ['跟', '在']
        }, {
            meaning: 'di / sedang',
            correct: '在',
            distractors: ['从', '到']
        }, {
            meaning: 'sudah',
            correct: '已经',
            distractors: ['马上', '还']
        }, {
            meaning: 'jangan',
            correct: '别',
            distractors: ['都', '也']
        }];

        // ============================================================
        //  GAME STATE
        // ============================================================
        let state = {
            questions: [],
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            wrongCount: 0,
            totalQuestions: 0,
            isAnimating: false,
            isDragging: false,
            answered: false,
            gameOver: false,
        };

        // DOM refs
        const $ = id => document.getElementById(id);
        const ball = $('ball');
        const ballGhost = $('ballGhost');
        const ballWrapper = $('ballWrapper');
        const baskets = [
            $('basket0'),
            $('basket1'),
            $('basket2')
        ];
        const hanziEls = [
            $('hanzi0'),
            $('hanzi1'),
            $('hanzi2')
        ];
        const meaningDisplay = $('meaningDisplay');
        const scoreDisplay = $('scoreDisplay');
        const correctCountEl = $('correctCount');
        const wrongCountEl = $('wrongCount');
        const questionCounter = $('questionCounter');
        const progressHint = $('progressHint');
        const feedbackArea = $('feedbackArea');
        const fbIcon = $('fbIcon');
        const fbText = $('fbText');
        const nextBtn = $('nextBtn');
        const gameOverEl = $('gameOver');
        const finalScore = $('finalScore');
        const finalDetail = $('finalDetail');
        const restartBtn = $('restartBtn');

        const sound = new SoundEngine();

        // ============================================================
        //  HELPERS
        // ============================================================
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function buildShuffledQuestions() {
            const qs = QUESTIONS.map(q => ({
                meaning: q.meaning,
                correct: q.correct,
                options: shuffle([q.correct, ...q.distractors])
            }));
            return shuffle(qs);
        }

        // ============================================================
        //  RENDER QUESTION
        // ============================================================
        function renderQuestion() {
            if (state.gameOver) return;
            const q = state.questions[state.currentIndex];
            if (!q) return;

            meaningDisplay.textContent = q.meaning;
            for (let i = 0; i < 3; i++) {
                hanziEls[i].textContent = q.options[i];
                // adjust font size for long hanzi
                hanziEls[i].classList.toggle('small', q.options[i].length > 2);
                baskets[i].className = 'basket';
                baskets[i].dataset.correct = q.options[i] === q.correct ? 'true' : 'false';
            }

            // Reset ball
            ball.className = 'ball';
            ball.style.display = 'block';
            ball.style.transform = '';
            ball.style.opacity = '1';
            ball.style.pointerEvents = 'auto';

            // Reset feedback
            fbIcon.textContent = '💡';
            fbText.textContent = 'Seret bola ke keranjang!';
            fbText.className = 'fb-text';
            feedbackArea.querySelector('.fb-score')?.remove();

            // Hide next button
            nextBtn.classList.remove('show');
            nextBtn.style.display = 'none';

            state.answered = false;
            state.isAnimating = false;

            // Update counter
            questionCounter.textContent = `${state.currentIndex + 1}/${state.totalQuestions}`;
            progressHint.textContent = 'Pilih keranjang yang benar';
        }

        // ============================================================
        //  UPDATE STATS
        // ============================================================
        function updateStats() {
            scoreDisplay.textContent = state.score;
            correctCountEl.textContent = state.correctCount;
            wrongCountEl.textContent = state.wrongCount;
        }

        // ============================================================
        //  HANDLE ANSWER
        // ============================================================
        function handleAnswer(basketEl) {
            if (state.isAnimating || state.answered || state.gameOver) return;
            const isCorrect = basketEl.dataset.correct === 'true';

            state.answered = true;
            state.isAnimating = true;

            // Disable ball
            ball.style.pointerEvents = 'none';

            // Find the correct basket for visual feedback
            const correctBasket = baskets.find(b => b.dataset.correct === 'true');

            if (isCorrect) {
                // ———— CORRECT ————
                state.score += 2;
                state.correctCount++;
                basketEl.classList.add('correct-glow');

                // Ball drops into basket
                ball.classList.add('dropped-correct');
                setTimeout(() => {
                    ball.style.display = 'none';
                }, 550);

                // Feedback
                fbIcon.textContent = '🎉';
                fbText.textContent = 'Benar! +2 poin';
                fbText.className = 'fb-text correct';

                // Sound: applause
                sound.playApplause();

                // Show score bump
                const bump = document.createElement('span');
                bump.className = 'fb-score';
                bump.textContent = '+2';
                feedbackArea.appendChild(bump);

            } else {
                // ———— WRONG ————
                state.score -= 3;
                state.wrongCount++;
                basketEl.classList.add('wrong-glow');

                // Ball bounces back
                ball.classList.add('dropped-wrong');
                setTimeout(() => {
                    ball.classList.remove('dropped-wrong');
                    ball.style.transform = '';
                }, 620);

                // Also highlight the correct basket
                if (correctBasket) {
                    correctBasket.classList.add('correct-glow');
                }

                // Feedback
                fbIcon.textContent = '😅';
                fbText.textContent = `Salah! -3 poin · Jawaban: ${correctBasket?.querySelector('.basket-hanzi')?.textContent || '?'}`;
                fbText.className = 'fb-text wrong';

                // Sound: mocking
                sound.playMocking();

                // Show score bump
                const bump = document.createElement('span');
                bump.className = 'fb-score';
                bump.textContent = '-3';
                bump.style.color = '#ff7a7a';
                feedbackArea.appendChild(bump);
            }

            updateStats();

            // Show next button after delay
            setTimeout(() => {
                state.isAnimating = false;
                if (!state.gameOver) {
                    nextBtn.style.display = 'block';
                    nextBtn.classList.add('show');
                    if (state.currentIndex >= state.totalQuestions - 1) {
                        nextBtn.textContent = '🏁 Lihat Hasil';
                    } else {
                        nextBtn.textContent = '▶ Lanjut';
                    }
                }
            }, 800);
        }

        // ============================================================
        //  NEXT QUESTION / GAME OVER
        // ============================================================
        function goToNext() {
            if (state.isAnimating) return;
            if (state.gameOver) return;

            if (state.currentIndex >= state.totalQuestions - 1) {
                // Game Over
                endGame();
                return;
            }

            state.currentIndex++;
            renderQuestion();
            // Reset basket glows
            baskets.forEach(b => b.className = 'basket');
            // Remove any extra fb-score
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
        }

        function endGame() {
            state.gameOver = true;
            gameOverEl.classList.add('show');
            finalScore.textContent = `Skor Akhir: ${state.score}`;
            finalDetail.textContent = `✅ ${state.correctCount} benar · ❌ ${state.wrongCount} salah`;
            // Hide game elements
            document.querySelector('.meaning-area').style.opacity = '0.4';
            document.querySelector('.baskets-row').style.opacity = '0.4';
            ball.style.display = 'none';
            nextBtn.style.display = 'none';
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
            fbIcon.textContent = '🏁';
            fbText.textContent = 'Permainan selesai!';
            fbText.className = 'fb-text';
        }

        // ============================================================
        //  RESTART
        // ============================================================
        function restartGame() {
            state.questions = buildShuffledQuestions();
            state.currentIndex = 0;
            state.score = 0;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.totalQuestions = state.questions.length;
            state.isAnimating = false;
            state.answered = false;
            state.gameOver = false;

            gameOverEl.classList.remove('show');
            document.querySelector('.meaning-area').style.opacity = '1';
            document.querySelector('.baskets-row').style.opacity = '1';
            ball.style.display = 'block';
            ball.className = 'ball';
            ball.style.pointerEvents = 'auto';
            nextBtn.style.display = 'none';
            nextBtn.classList.remove('show');
            nextBtn.textContent = '▶ Lanjut';
            feedbackArea.querySelectorAll('.fb-score').forEach(el => el.remove());
            baskets.forEach(b => b.className = 'basket');

            updateStats();
            renderQuestion();
            // Re-init sound context on user interaction
            if (!sound.ready) {
                sound.init();
            }
        }

        // ============================================================
        //  DRAG & DROP (Mouse + Touch)
        // ============================================================
        let dragData = {
            active: false,
            startX: 0,
            startY: 0,
            offsetX: 0,
            offsetY: 0,
            ghostVisible: false,
        };

        function getBallCenter() {
            const rect = ball.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function getBasketCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function isOverBasket(basketEl, clientX, clientY) {
            const rect = basketEl.getBoundingClientRect();
            // Use a slightly smaller hit area for better feel
            const pad = 12;
            return clientX >= rect.left + pad &&
                clientX <= rect.right - pad &&
                clientY >= rect.top + pad &&
                clientY <= rect.bottom - pad;
        }

        function getBasketAt(clientX, clientY) {
            for (const b of baskets) {
                if (isOverBasket(b, clientX, clientY)) {
                    return b;
                }
            }
            return null;
        }

        // ———— MOUSE ————
        function onMouseDown(e) {
            if (state.isAnimating || state.answered || state.gameOver) return;
            if (e.button !== 0) return;
            e.preventDefault();
            const rect = ball.getBoundingClientRect();
            dragData.offsetX = e.clientX - rect.left;
            dragData.offsetY = e.clientY - rect.top;
            dragData.active = true;
            dragData.ghostVisible = true;

            ball.classList.add('dragging');
            ballGhost.style.display = 'block';
            ballGhost.style.left = e.clientX + 'px';
            ballGhost.style.top = e.clientY + 'px';
            ball.style.opacity = '0.4';

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function onMouseMove(e) {
            if (!dragData.active) return;
            e.preventDefault();
            ballGhost.style.left = e.clientX + 'px';
            ballGhost.style.top = e.clientY + 'px';

            // Highlight basket on hover
            const over = getBasketAt(e.clientX, e.clientY);
            baskets.forEach(b => b.classList.remove('drag-over'));
            if (over) over.classList.add('drag-over');
        }

        function onMouseUp(e) {
            if (!dragData.active) return;
            dragData.active = false;
            dragData.ghostVisible = false;
            ball.classList.remove('dragging');
            ballGhost.style.display = 'none';
            ball.style.opacity = '1';

            baskets.forEach(b => b.classList.remove('drag-over'));

            const over = getBasketAt(e.clientX, e.clientY);
            if (over && !state.isAnimating && !state.answered) {
                handleAnswer(over);
            } else {
                // Snap ball back
                ball.style.transform = '';
            }

            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        // ———— TOUCH ————
        function onTouchStart(e) {
            if (state.isAnimating || state.answered || state.gameOver) return;
            const touch = e.touches[0];
            if (!touch) return;
            e.preventDefault();

            const rect = ball.getBoundingClientRect();
            dragData.offsetX = touch.clientX - rect.left;
            dragData.offsetY = touch.clientY - rect.top;
            dragData.active = true;
            dragData.ghostVisible = true;

            ball.classList.add('dragging');
            ballGhost.style.display = 'block';
            ballGhost.style.left = touch.clientX + 'px';
            ballGhost.style.top = touch.clientY + 'px';
            ball.style.opacity = '0.4';

            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onTouchEnd, { passive: false });
        }

        function onTouchMove(e) {
            if (!dragData.active) return;
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            ballGhost.style.left = touch.clientX + 'px';
            ballGhost.style.top = touch.clientY + 'px';

            const over = getBasketAt(touch.clientX, touch.clientY);
            baskets.forEach(b => b.classList.remove('drag-over'));
            if (over) over.classList.add('drag-over');
        }

        function onTouchEnd(e) {
            if (!dragData.active) return;
            dragData.active = false;
            dragData.ghostVisible = false;
            ball.classList.remove('dragging');
            ballGhost.style.display = 'none';
            ball.style.opacity = '1';

            baskets.forEach(b => b.classList.remove('drag-over'));

            const touch = e.changedTouches[0];
            if (touch) {
                const over = getBasketAt(touch.clientX, touch.clientY);
                if (over && !state.isAnimating && !state.answered) {
                    handleAnswer(over);
                } else {
                    ball.style.transform = '';
                }
            }

            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend', onTouchEnd);
        }

        // ============================================================
        //  INIT
        // ============================================================
        function init() {
            // Sound init on first user interaction
            document.addEventListener('click', () => {
                if (!sound.ready) sound.init();
            }, { once: true });
            document.addEventListener('touchstart', () => {
                if (!sound.ready) sound.init();
            }, { once: true });

            state.questions = buildShuffledQuestions();
            state.totalQuestions = state.questions.length;
            state.currentIndex = 0;
            state.score = 0;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.gameOver = false;

            updateStats();
            renderQuestion();

            // Event listeners
            ball.addEventListener('mousedown', onMouseDown);
            ball.addEventListener('touchstart', onTouchStart, { passive: false });

            nextBtn.addEventListener('click', goToNext);
            restartBtn.addEventListener('click', restartGame);

            // Prevent context menu on long press
            ball.addEventListener('contextmenu', e => e.preventDefault());

            // Keyboard shortcut: Space or Enter to advance
            document.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.key === 'Enter') && nextBtn.classList.contains('show')) {
                    e.preventDefault();
                    goToNext();
                }
                if (e.key === 'r' && state.gameOver) {
                    restartGame();
                }
            });

            console.log('🏀 入球游戏已启动!');
        }

        // Start when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

</body>
</html>
